services:
  postgres:
    image: postgres:15-alpine
    container_name: magnifai-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${{POSTGRES_USER:-magnifai}}
      POSTGRES_PASSWORD: ${{POSTGRES_PASSWORD:-magnifai}}
      POSTGRES_DB: ${{POSTGRES_DB:-magnifai}}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magnifai} -d ${POSTGRES_DB:-magnifai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - magnifai-internal

  redis:
    image: redis:7-alpine
    container_name: magnifai-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${{REDIS_PASSWORD:-magnifai}}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-magnifai}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - magnifai-internal

volumes:
  postgres_data:
  redis_data:

networks:
  magnifai-internal:
    internal: true
